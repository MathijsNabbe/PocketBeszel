services:
  beszel-dashboard:
    build: .
    container_name: beszel-dashboard
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      BESZEL_URL: "http://beszel:8090"
      BESZEL_API_KEY: ""
      BESZEL_EMAIL: ""
      BESZEL_PASSWORD: ""
      REFRESH_INTERVAL: "10000"
    restart: unless-stopped
    # Uncomment if Beszel runs on the same Docker network:
    # networks:
    #   - beszel

